version: "3.8"

services:
  threat-intel-cli:
    build: .
    container_name: threat-intel-cli
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-}
      VT_API_KEY: ${VT_API_KEY:-}
      MISP_API_KEY: ${MISP_API_KEY:-}
      MISP_URL: ${MISP_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ./config:/app/config:ro
    restart: "no"
